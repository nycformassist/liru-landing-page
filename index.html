<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIRU - Legal Intake Readiness Utility | SMRG Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .bg-smrg-navy { background-color: #0A192F; }
        .text-smrg-navy { color: #0A192F; }
        .text-smrg-gold { color: #C5A059; }
        .btn-gold { background-color: #C5A059; color: #0A192F; transition: all 0.3s ease; }
        .btn-gold:hover { background-color: #AD8B45; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(197, 160, 89, 0.3); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="py-6 px-8 flex justify-between items-center bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="text-2xl font-bold tracking-tighter text-smrg-navy">SMRG<span class="text-smrg-gold">CONSULTING</span></div>
        <a href="#pilot" class="btn-gold px-6 py-2 rounded-sm font-semibold text-sm uppercase tracking-widest">Start Pilot</a>
    </nav>

    <section id="pilot" class="py-24 px-6 text-center bg-white">
        <div class="max-w-3xl mx-auto border-2 border-slate-200 p-12 rounded-lg bg-slate-50/50">
            <h2 class="text-3xl mb-6 text-smrg-navy font-serif italic font-bold">Start a 10-Lead Pilot</h2>
            <p class="text-slate-600 mb-10 text-lg">Run Liru on your next 10 leads.</p>
            
            <form id="pilot-form" class="flex flex-col gap-4 max-w-md mx-auto">
                <input type="text" id="lead-name" placeholder="Full Name" required class="p-4 rounded-sm border border-slate-300 outline-none">
                <input type="email" id="lead-email" placeholder="Firm Email" required class="p-4 rounded-sm border border-slate-300 outline-none">
                <div class="text-left">
                    <label class="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Firm Website (Must start with https://)</label>
                    <input type="url" id="lead-website" placeholder="https://smrgconsulting.com" required class="w-full p-4 rounded-sm border border-slate-300 outline-none">
                </div>
                <input type="tel" id="lead-phone" placeholder="Phone Number" required class="p-4 rounded-sm border border-slate-300 outline-none">
                <button type="submit" id="submit-btn" class="btn-gold px-12 py-5 rounded-sm font-bold text-xl uppercase tracking-widest">Request Pilot Access</button>
            </form>
            <p id="response-msg" class="mt-4 font-bold hidden"></p>
        </div>
    </section>

    <script>
        // Auto-fix URL format
        document.getElementById('lead-website').addEventListener('blur', function(e) {
            let url = e.target.value.trim();
            if (url && !/^https?:\/\//i.test(url)) { e.target.value = 'https://' + url; }
        });

        document.getElementById('pilot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                name: document.getElementById('lead-name').value,
                email: document.getElementById('lead-email').value,
                website: document.getElementById('lead-website').value,
                phone: document.getElementById('lead-phone').value
            };
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('response-msg');
            btn.disabled = true; btn.innerText = 'PROCESSING...';
            try {
                const response = await fetch('/api/send-lead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                if (response.ok) {
                    msg.innerText = "Application Received.";
                    msg.className = "mt-4 font-bold text-green-600";
                    msg.classList.remove('hidden');
                    btn.innerText = "REQUEST SENT";
                } else { throw new Error(); }
            } catch (error) {
                msg.innerText = "System Error. Email support@smrgconsulting.com";
                msg.className = "mt-4 font-bold text-red-600";
                msg.classList.remove('hidden');
                btn.disabled = false; btn.innerText = "TRY AGAIN";
            }
        });
    </script>
</body>
</html>
